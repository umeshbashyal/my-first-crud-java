<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>People</title>
	<style>
		body { font-family: Arial, sans-serif; margin: 24px; }
		table { border-collapse: collapse; width: 100%; }
		th, td { border: 1px solid #ddd; padding: 10px; }
		th { background: #f5f5f5; text-align: left; }
		.actions form { display: inline; }
		.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px; }
		.msg { background:#e8fff0; border:1px solid #b7f5cc; padding:10px; margin: 12px 0; }
		.btn { padding: 8px 12px; border: 1px solid #333; background: #fff; cursor: pointer; text-decoration:none; color:#000; }
	</style>
</head>
<body>
	<div class="topbar">
		<h2>People</h2>
		<a class="btn" th:href="@{/people/new}">Add New</a>
	</div>

	<div class="msg" th:if="${message}" th:text="${message}"></div>

	<table>
		<thead>
		<tr>
			<th>ID</th>
			<th>Name</th>
			<th>Email</th>
			<th>Actions</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="p : ${people}">
			<td th:text="${p.id}"></td>
			<td th:text="${p.name}"></td>
			<td th:text="${p.email}"></td>
			<td class="actions">
				<a class="btn" th:href="@{/people/{id}/edit(id=${p.id})}">Edit</a>
				<form th:action="@{/people/{id}/delete(id=${p.id})}" method="post">
					<button class="btn" type="submit">Delete</button>
				</form>
			</td>
		</tr>
		</tbody>
	</table>
</body>
</html>
